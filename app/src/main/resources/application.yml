cache: true
myHostname: https://evangeliumstaucher.nobler.tech
logging:
  level:
    de:
      evangeliumstaucher: WARN
    org:
      crosswire: off
      springframework:
        security: WARN
      thymeleaf: ERROR
    root: warn
    web: WARN

spring.ssl.bundle.jks:
  server:
    reload-on-update: true
    key.alias: gd
    keystore:
      location: gd.p12
      type: PKCS12
      password: changeit

server:
  ssl:
    bundle: server
  port: 8443
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 2048
spring:
  profiles:
    default: default,db,creds,devH2,accounts,logging

  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
