<!DOCTYPE html>
<html lang="de" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dein Konto - Evangeliumstaucher</title>
    <head th:insert="~{head.html :: head}"/>
</head>
<body>

<div class="bg-image"></div>
<div th:insert="~{navbar.html :: navbar}"></div>

<div class="container py-5 min-vh-100">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">

            <div class="card shadow-lg mb-4 border-0 glass-panel">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <div class="avatar-circle mx-auto mb-3">
                            <span class="display-4 fw-bold">Hallo Taucher</span>
                        </div>
                        <p class="text-muted-light">Taucher ID: <span class="font-monospace"
                                                                      th:text="${playerModel?.name}">ID-12345</span>
                        </p>


                        <div class="d-grid gap-3 d-sm-flex justify-content-center">
                            <a class="btn btn-outline-secondary btn-lg px-4 gap-3" href="/edituser">
                                <i class="fas fa-pen me-2"></i>Name ändern
                            </a>
                            <form class="d-inline" method="post" th:action="@{/logout}">
                                <button class="btn btn-primary btn-lg px-4 w-100" type="submit">
                                    <i class="fas fa-sign-out-alt me-2"></i> Abmelden
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:insert="~{footer.html :: footer}"></div>
    <script src="/js/paralax.js"></script>
</body>
</html>
